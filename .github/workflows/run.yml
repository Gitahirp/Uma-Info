name: Twitter to Discord
on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests ntscraper
      - name: Run Script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py
      - name: Commit changes # This saves the 'last_tweet.txt' so it doesn't double-post
        run: |
          git config --global user.name 'bot'
          git config --global user.email 'bot@github.com'
          git add last_tweet.txt
          git commit -m "Update last tweet" || exit 0
          git push
