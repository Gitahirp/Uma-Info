name: Twitter to Discord
on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python tweet_to_discord.py
        
      - name: Commit last tweet ID
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          # This check prevents the 'pathspec' error if the file is missing
          if [ -f last_tweet_id.txt ]; then
            git add last_tweet_id.txt
            git commit -m "Update last tweet ID" || echo "No changes to commit"
            git push
          else
            echo "File last_tweet_id.txt not found, skipping commit."
          fi
